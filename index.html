<!DOCTYPE html>
<!-- 文档类型声明：HTML5 -->
<html lang="zh-CN">
<!-- 根元素，语言设置为中文 -->
<head>
    <!-- 字符编码设置为UTF-8 -->
    <meta charset="UTF-8">
    <!-- 视口设置，确保在不同设备上正确显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题 -->
    <title>双人打僵尸</title>
    <!-- 引入样式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 游戏容器，包含所有游戏元素 -->
    <div class="game-container">
        <!-- 游戏画布，用于绘制游戏场景 -->
        <canvas id="gameCanvas" width="900" height="675"></canvas>
        
        <!-- 游戏信息面板，显示玩家状态 -->
        <div class="game-info">
            <!-- 玩家1信息 -->
            <div class="player1">
                <h3>玩家1</h3>
                <p>生命值: <span id="player1Health">100</span></p>
                <p>分数: <span id="player1Score">0</span></p>
            </div>
            <!-- 玩家2信息 -->
            <div class="player2">
                <h3>玩家2</h3>
                <p>生命值: <span id="player2Health">100</span></p>
                <p>分数: <span id="player2Score">0</span></p>
            </div>
        </div>
        
        <!-- 游戏控制说明 -->
        <div class="controls">
            <!-- 玩家1控制说明 -->
            <div class="player1-controls">
                <h4>玩家1控制</h4>
                <p>WASD移动，空格键射击</p>
                <p>Q键：上一个武器 | E键：下一个武器</p>
            </div>
            <!-- 玩家2控制说明 -->
            <div class="player2-controls">
                <h4>玩家2控制</h4>
                <p>方向键移动，回车键射击</p>
                <p>Q键：上一个武器 | E键：下一个武器</p>
            </div>
            <!-- 作弊码说明 -->
            <div class="cheats">
                <h4>作弊码</h4>
                <p>1: 无敌 | 2: 怪物静止 | 3: 清屏 | 4: 自动射击</p>
            </div>
        </div>
        
        <!-- 游戏日志容器 -->
        <div class="log-container">
            <h4>游戏日志</h4>
            <div id="gameLog" class="game-log"></div>
        </div>
        
        <!-- 游戏结束界面 -->
        <div id="gameOver" class="game-over">
            <h2>游戏结束</h2>
            <p id="winner"></p>
            <button onclick="restartGame()">重新开始</button>
        </div>
        
        <!-- 游戏开始界面 -->
        <div id="startScreen" class="start-screen">
            <h2>双人打僵尸</h2>
            <p>消灭所有僵尸，生存下来！</p>
            <button onclick="startGame()">开始游戏</button>
        </div>
    </div>
    
    <!-- 引入游戏逻辑脚本 -->
    <script src="game.js"></script>
</body>
</html>
